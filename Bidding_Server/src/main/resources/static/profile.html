<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>User Profile</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f4; }
        .profile-card { border: 1px solid #ccc; border-radius: 8px; padding: 20px; max-width: 500px; background-color: white; margin: auto; }
        #upgrade-btn { background-color: #ffc107; border: none; padding: 10px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        #status-message { font-weight: bold; margin-top: 15px; }
        h1 { text-align: center; }
    </style>
</head>
<body>

    <h1>Thông Tin Cá Nhân (Web)</h1>

    <div class="profile-card">
        <p><strong>Tên đăng nhập:</strong> <span id="username-span">Đang tải...</span></p>
        <p><strong>Họ và Tên:</strong> <span id="fullname-span">Đang tải...</span></p>
        <p><strong>Email:</strong> <span id="email-span">Đang tải...</span></p>
        <p><strong>Vai trò:</strong> <span id="role-span">Đang tải...</span></p>

        <hr>

        <!-- Nút bấm này sẽ được ẩn/hiện bằng JavaScript -->
        <button id="upgrade-btn" style="display: none;">Yêu cầu trở thành Người bán</button>

        <p id="status-message"></p>
    </div>

    <!-- Nhúng file JavaScript để xử lý logic -->
    <script src="profile.js"></script>

</body>
</html>
