sonar.projectKey=Team13_BiddingSystem
sonar.projectName=Team13 Bidding System
sonar.projectVersion=1.0-SNAPSHOT
sonar.organization=team13

# Source code location
sonar.sources=Bidding_Server/src/main,Bidding_Client/src/main,shared/src/main
sonar.tests=Bidding_Server/src/test

# Inclusions/Exclusions
sonar.inclusions=**/*.java
sonar.exclusions=**/target/**,**/*.md

# Test files pattern
sonar.test.inclusions=**/*Test.java,**/*Tests.java

# Code coverage
sonar.coverage.jacoco.xmlReportPaths=Bidding_Server/target/site/jacoco/jacoco.xml
sonar.junit.reportPaths=Bidding_Server/target/surefire-reports

# Encoding
sonar.sourceEncoding=UTF-8

# Thresholds
sonar.projectDescription=Enterprise Online Auction Platform with real-time bidding, WebSocket support, and multi-role management

