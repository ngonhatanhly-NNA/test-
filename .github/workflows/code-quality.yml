name: Code Quality & Coverage

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quality:
    runs-on: ubuntu-latest
    if: ${{ secrets.SONAR_TOKEN != '' }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: 25
        distribution: 'temurin'
        cache: maven

    - name: Build & Generate Coverage
      run: mvn clean verify jacoco:report

    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=Team13_BiddingSystem
          -Dsonar.organization=team13
          -Dsonar.sources=Bidding_Server/src/main,Bidding_Client/src/main,shared/src/main
          -Dsonar.tests=Bidding_Server/src/test
          -Dsonar.coverage.jacoco.xmlReportPaths=Bidding_Server/target/site/jacoco/jacoco.xml

    - name: Generate Test Summary
      if: always()
      run: |
        echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
        mvn surefire-report:report -q || true

    - name: Check Code Coverage
      run: |
        echo "Checking code coverage thresholds..."
        # Add coverage threshold check here if needed

