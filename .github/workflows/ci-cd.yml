name: Java CI/CD Multi-Environment Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'
          cache: maven

      # Bước này quan trọng: Build module shared trước hoặc build toàn bộ project với install
      - name: Build and Install Dependencies
        run: mvn -B clean install -DskipTests

      - name: Build and Test Project
        # Bây giờ chạy verify sẽ đảm bảo dùng đúng bản DTO vừa install ở trên
        run: mvn -B verify

      - name: Upload Jacoco Coverage Report (Ubuntu Only)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: "**/target/site/jacoco/"