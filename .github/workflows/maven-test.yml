name: Maven Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java-version: [ '25' ]

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK ${{ matrix.java-version }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean verify -DskipTests=false

    - name: Run Tests
      run: mvn test -B

    - name: Generate Test Report
      if: always()
      run: mvn surefire-report:report

    - name: Generate Code Coverage
      run: mvn jacoco:report

    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./Bidding_Server/target/site/jacoco/jacoco.xml,./Bidding_Client/target/site/jacoco/jacoco.xml
        fail_ci_if_error: false
        verbose: true

    - name: Archive Test Results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results
        path: |
          **/target/surefire-reports/
          **/target/site/jacoco/

    - name: Comment PR with Test Results
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const testResultPath = './Bidding_Server/target/surefire-reports/TEST-*.xml';
          console.log('Test results available at: target/surefire-reports/');
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '✅ Build and tests completed! Check artifacts for detailed results.'
          });

