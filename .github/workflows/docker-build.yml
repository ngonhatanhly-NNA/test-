name: Docker Build & Push

on:
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    # NOTE: Workflow này đang để chạy thủ công vì repo hiện chưa có Dockerfile.server/Dockerfile.client
    # và JAR hiện tại chưa chắc là fat-jar (đủ dependency) để chạy trong container.

    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Server Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile.server
        push: false
        tags: team13/bidding-server:latest
        outputs: type=docker,dest=/tmp/server-image.tar

    - name: Build Client Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile.client
        push: false
        tags: team13/bidding-client:latest
        outputs: type=docker,dest=/tmp/client-image.tar

    - name: Upload Docker Images
      uses: actions/upload-artifact@v3
      with:
        name: docker-images
        path: /tmp/*.tar
        retention-days: 7

