version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: team13-bidding-db
    environment:
      MYSQL_ROOT_PASSWORD: auction
      MYSQL_DATABASE: auction_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: team13-bidding-server
    depends_on:
      - db
    environment:
      DB_URL: jdbc:mysql://db:3306/auction_db
      DB_USER: root
      DB_PASSWORD: auction
      JWT_SECRET: change-me
    ports:
      - "7070:7070"
      - "8080:8080"

volumes:
  db_data:

